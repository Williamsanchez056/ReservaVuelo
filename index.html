<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyBook - Reserva tu Vuelo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">✈️ SkyBook</div>
            <nav class="nav">
                <a href="#" class="nav-link">Inicio</a>
                <a href="#" class="nav-link">Mis Reservas</a>
                <a href="#" class="nav-link">Contacto</a>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Vuela a Donde Desees</h1>
            <p>Encuentra los mejores vuelos al mejor precio</p>
        </div>
    </section>

    <!-- Search Form -->
    <section class="search-section">
        <div class="container">
            <div class="search-form">
                <div class="form-group">
                    <label for="departure">Salida</label>
                    <input type="text" id="departure" placeholder="De dónde">
                </div>
                <div class="form-group">
                    <label for="arrival">Destino</label>
                    <input type="text" id="arrival" placeholder="Hacia dónde">
                </div>
                <div class="form-group">
                    <label for="departure-date">Fecha de Salida</label>
                    <input type="date" id="departure-date">
                </div>
                <div class="form-group">
                    <label for="return-date">Fecha de Regreso</label>
                    <input type="date" id="return-date">
                </div>
                <div class="form-group">
                    <label for="passengers">Pasajeros</label>
                    <select id="passengers">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                    </select>
                </div>
                <button class="search-btn">Buscar Vuelos</button>
            </div>
        </div>
    </section>

    <!-- Flights Grid -->
    <section class="flights-section">
        <div class="container">
            <h2 class="section-title">Vuelos Disponibles</h2>
            <div class="search-feedback">
                <div class="loader hidden" id="loader">Cargando vuelos...</div>
                <div class="message" id="message">Busca vuelos para ver resultados</div>
            </div>
            <div class="flights-grid" id="flightsGrid"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SkyBook. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
